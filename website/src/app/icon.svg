<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Candle 1 - Bearish (red) -->
  <line x1="138" y1="100" x2="138" y2="412" stroke="#F6465D" stroke-width="14" stroke-linecap="round"/>
  <rect x="108" y="160" width="60" height="180" rx="8" fill="#F6465D"/>
  <!-- Candle 2 - Bullish (green, tall) -->
  <line x1="256" y1="70" x2="256" y2="380" stroke="#2DC08E" stroke-width="14" stroke-linecap="round"/>
  <rect x="226" y="130" width="60" height="200" rx="8" fill="#2DC08E"/>
  <!-- Candle 3 - Bullish (green, short) -->
  <line x1="374" y1="120" x2="374" y2="400" stroke="#2DC08E" stroke-width="14" stroke-linecap="round"/>
  <rect x="344" y="200" width="60" height="120" rx="8" fill="#2DC08E"/>
</svg>
